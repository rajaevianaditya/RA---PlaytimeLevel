# PlaytimeLevel Configuration v1.5
settings:
  # Auto-save data interval in seconds (5 minutes = 300 seconds)
  data-save-interval: 300
  # Use EssentialsX as playtime source
  use-essentials-playtime: true
  # Level check interval in seconds (default: 60 seconds)
  level-check-interval: 60

level-system:
# Maximum level limit
  max-level: 100

#Level Rewards System
rewards:
  enabled: true
  # Broadcast settings
  broadcast-enabled: true  # Broadcast reward announcements to all players
  broadcast-message: "§6§lANNOUNCEMENT! §e%player% §7reached §6Level %level% §7and received amazing rewards!"

  # Reward messages
  reward-message: "§6§lREWARD! §eYou reached level %level% and received rewards!"
  already-claimed: "§cYou have already claimed the reward for level %level%"

  # Define rewards for specific levels
  levels:
    1:
      commands:
        - "ac key give %player% votecrate 15"
        - "ac key give %player% spawneggcrate 12"
        - "ac key give %player% sellwandcrate 6"
        - "eco give %player% 1000"
      message: "§a§lLEVEL §6§l1 §a§lREWARD"
      broadcast: false

    2:
      commands:
        - "ac key give %player% votecrate 15"
        - "ac key give %player% spawneggcrate 12"
        - "ac key give %player% sellwandcrate 6"
        - "eco give %player% 2000"
      message: "§a§lLEVEL §6§l2 §a§lREWARD"
      broadcast: false

    3:
      commands:
        - "ac key give %player% votecrate 15"
        - "ac key give %player% spawneggcrate 12"
        - "ac key give %player% sellwandcrate 6"
        - "eco give %player% 3000"
      message: "§a§lLEVEL §6§l3 §a§lREWARD"
      broadcast: false

    4:
      commands:
        - "ac key give %player% votecrate 15"
        - "ac key give %player% spawneggcrate 12"
        - "ac key give %player% sellwandcrate 6"
        - "eco give %player% 4000"
      message: "§a§lLEVEL §6§l4 §a§lREWARD"
      broadcast: false

    5:
      commands:
        - "ac key give %player% votecrate 15"
        - "ac key give %player% spawneggcrate 12"
        - "ac key give %player% sellwandcrate 6"
        - "eco give %player% 5000"
      message: "§a§lLEVEL §6§l5 §a§lREWARD"
      broadcast: false

    #and more

placeholder:

  max-level-format: "§6§l[ §eMAX §6§l] §f§l|"
  # Format for %playtimelevel_level_formatted%
  level-format: "§e[ §6%level% §e] §f§l|"

  # Format for %playtimelevel_level_color_formatted%
  level-color-format: "%color%[ %level% ] §f§l|"

  # Progress bar format
  progress-bar:
    length: 10
    filled: "§a▊"
    empty: "§7▊"

  # Time format
  time-format:
    hours: "§b%hours% §ehours"
    minutes: "§b%minutes% §eminutes"
    seconds: "§b%seconds% §eseconds"

level-colors:
