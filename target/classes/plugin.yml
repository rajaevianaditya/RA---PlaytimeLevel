name: PlaytimeLevel
version: 1.6
main: id.rajaaditya.playtimelevel.PlaytimeLevel
api-version: 1.21
author: RajaAditya
website: https://rajaaditya.my.id/
description: >
  PlaytimeLevel is a playtime-based leveling plugin featuring a progressive level system,
  customizable rewards, PlaceholderAPI support, and EssentialsX integration.

depend: [Essentials]
softdepend: [PlaceholderAPI]

# Tested & supported on Paper 1.21.1 – 1.21.4 (api-version: 1.21 covers all 1.21.x builds)
# Compatible with Paper 1.21.10 and 1.21.11

commands:
  level:
    description: Check your playtime level, progression stats, and claim rewards
    usage: /<command> [check|info|rewards|claim|reset|reload] [player|level|all]
    aliases: [lvl, playtimelevel]

permissions:
  playtimelevel.use:
    description: Access /level command to view your own stats
    default: true
  playtimelevel.check.others:
    description: Check another player's level and playtime stats
    default: op
  playtimelevel.reload:
    description: Reload the plugin configuration without restarting the server
    default: op
  playtimelevel.reward:
    description: Claim level rewards using /level claim
    default: true
  playtimelevel.reset:
    description: Reset a player's claimed reward data (online or offline)
    default: op
  playtimelevel.*:
    description: Grants all PlaytimeLevel permissions
    default: op
    children:
      playtimelevel.use: true
      playtimelevel.check.others: true
      playtimelevel.reload: true
      playtimelevel.reward: true
      playtimelevel.reset: true